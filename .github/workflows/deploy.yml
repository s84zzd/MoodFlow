name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
          VITE_DEEPSEEK_API_URL: ${{ secrets.VITE_DEEPSEEK_API_URL }}
          VITE_DEEPSEEK_MODEL: ${{ secrets.VITE_DEEPSEEK_MODEL }}
          VITE_ENABLE_AI: ${{ secrets.VITE_ENABLE_AI }}
          VITE_ENABLE_CHECKIN_LIMIT: ${{ secrets.VITE_ENABLE_CHECKIN_LIMIT }}
          VITE_ENABLE_AI_ADVICE_LIMIT: ${{ secrets.VITE_ENABLE_AI_ADVICE_LIMIT }}
          VITE_ENABLE_REPORT_LIMIT: ${{ secrets.VITE_ENABLE_REPORT_LIMIT }}

      - name: Deploy to Vercel
        uses: vercel/action-deploy@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
